<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Допомога Поруч: Новояворівськ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <h1>Допомога Поруч 🇺🇦</h1>
            <p>Волонтерський хаб Новояворівської громади</p>
        </div>
    </header>

    <main class="container">
        <section class="intro">
            <h2>Актуальні потреби</h2>
            <p>Оберіть ініціативу, яку ви хочете підтримати сьогодні. Важлива кожна допомога!</p>
        </section>

        <!-- Контейнер, куди JS буде вставляти картки -->
        <div id="campaigns-container" class="campaigns-grid">
            <!-- Картки генеруються автоматично -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Проектна робота. Розроблено для курсу "Управління ІТ-проектами".</p>
        </div>
    </footer>
<div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modal-title">Назва збору</h3>
            <p id="modal-status" class="modal-status">Статус</p>
            
            <div id="financial-block">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <button class="btn btn-donate" onclick="alert('Дякуємо! У реальному проекті тут відкриється платіжна система.')">Задонатити</button>
            </div>

            <div id="volunteer-block" style="display: none;">
                <input type="text" id="volunteer-name" class="modal-input" placeholder="Введіть ваше ПІБ" oninput="this.value = this.value.replace(/[0-9]/g, '')">
<input type="tel" id="volunteer-phone" class="modal-input" placeholder="Ваш номер телефону" oninput="this.value = this.value.replace(/[^0-9+]/g, '')">
                <button class="btn btn-volunteer" onclick="alert('Дякуємо за реєстрацію! Ваш контакт передано координатору.')">Записатися</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
